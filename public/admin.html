<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 - 合肥拆除FAQ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
    * { font-family: 'Noto Sans SC', sans-serif; }
    body { background: #f5f5f5; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
  </style>
</head>
<body class="min-h-screen">

  <!-- 登录页 -->
  <div id="loginPage" class="flex items-center justify-center min-h-screen px-4">
    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
      <div class="text-center mb-6">
        <div class="w-14 h-14 bg-gradient-to-br from-orange-400 to-orange-600 rounded-xl flex items-center justify-center mx-auto mb-4">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
        </div>
        <h1 class="text-xl font-bold text-gray-800">管理后台</h1>
        <p class="text-gray-400 text-sm mt-1">合肥拆除 FAQ 卡片管理</p>
      </div>
      <input type="password" id="pwdInput" placeholder="请输入密码" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-400 mb-4">
      <button onclick="doLogin()" class="w-full py-3 bg-gradient-to-r from-orange-400 to-orange-600 text-white rounded-xl font-medium hover:opacity-90 transition">登录</button>
      <p id="loginError" class="text-red-500 text-sm text-center mt-3 hidden">密码错误</p>
    </div>
  </div>

  <!-- 管理页 -->
  <div id="adminPage" class="hidden">
    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-10">
      <div class="max-w-3xl mx-auto px-4 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-gradient-to-br from-orange-400 to-orange-600 rounded-lg flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
            </svg>
          </div>
          <div>
            <h1 class="font-bold text-gray-800">FAQ 卡片管理</h1>
            <p class="text-xs text-gray-400">共 <span id="totalCount">0</span> 张卡片</p>
          </div>
        </div>
        <button onclick="openAddModal()" class="px-4 py-2 bg-orange-500 text-white rounded-lg text-sm font-medium hover:bg-orange-600 transition flex items-center gap-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          新增卡片
        </button>
      </div>
    </header>

    <!-- 列表 -->
    <main class="max-w-3xl mx-auto px-4 py-6">
      <div id="faqList" class="space-y-3">
        <!-- 动态生成 -->
      </div>
    </main>
  </div>

  <!-- 编辑/新增弹窗 -->
  <div id="editModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 px-4">
    <div class="bg-white rounded-2xl p-6 w-full max-w-lg max-h-[90vh] overflow-y-auto">
      <h2 id="modalTitle" class="text-lg font-bold text-gray-800 mb-4">新增卡片</h2>
      <input type="hidden" id="editId">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">问题 / 标题</label>
        <input type="text" id="editQuestion" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-400">
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">回答 / 内容（支持换行）</label>
        <textarea id="editAnswer" rows="8" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-400 resize-none"></textarea>
      </div>
      <div class="flex gap-3">
        <button onclick="closeModal()" class="flex-1 py-3 bg-gray-100 text-gray-700 rounded-xl font-medium hover:bg-gray-200 transition">取消</button>
        <button onclick="saveCard()" class="flex-1 py-3 bg-gradient-to-r from-orange-400 to-orange-600 text-white rounded-xl font-medium hover:opacity-90 transition">保存</button>
      </div>
    </div>
  </div>

  <script>
    const ADMIN_PWD = 'admin123';
    let faqData = [];

    function doLogin() {
      const pwd = document.getElementById('pwdInput').value;
      if (pwd === ADMIN_PWD) {
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('adminPage').classList.remove('hidden');
        loadFaqList();
      } else {
        document.getElementById('loginError').classList.remove('hidden');
      }
    }

    // 回车登录
    document.getElementById('pwdInput')?.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') doLogin();
    });

    async function loadFaqList() {
      const res = await fetch('/api/faq');
      faqData = await res.json();
      document.getElementById('totalCount').textContent = faqData.length;

      const list = document.getElementById('faqList');
      list.innerHTML = '';

      faqData.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'bg-white rounded-xl p-4 shadow-sm card-hover transition-all duration-200';
        div.innerHTML = `
          <div class="flex items-start gap-3">
            <span class="flex-shrink-0 w-7 h-7 bg-orange-100 text-orange-600 rounded-lg flex items-center justify-center text-sm font-bold">${index + 1}</span>
            <div class="flex-1 min-w-0">
              <h3 class="font-bold text-gray-800 mb-1">${escapeHtml(item.question)}</h3>
              <p class="text-gray-500 text-sm line-clamp-3 whitespace-pre-line">${escapeHtml(item.answer)}</p>
            </div>
            <div class="flex flex-col gap-2 flex-shrink-0">
              <button onclick="openEditModal(${item.id})" class="w-8 h-8 bg-blue-50 text-blue-500 rounded-lg flex items-center justify-center hover:bg-blue-100 transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
              </button>
              <button onclick="deleteCard(${item.id})" class="w-8 h-8 bg-red-50 text-red-500 rounded-lg flex items-center justify-center hover:bg-red-100 transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
              </button>
            </div>
          </div>
        `;
        list.appendChild(div);
      });
    }

    function openAddModal() {
      document.getElementById('editId').value = '';
      document.getElementById('editQuestion').value = '';
      document.getElementById('editAnswer').value = '';
      document.getElementById('modalTitle').textContent = '新增卡片';
      document.getElementById('editModal').classList.remove('hidden');
      document.getElementById('editModal').classList.add('flex');
    }

    function openEditModal(id) {
      const item = faqData.find(f => f.id === id);
      if (!item) return;
      document.getElementById('editId').value = item.id;
      document.getElementById('editQuestion').value = item.question;
      document.getElementById('editAnswer').value = item.answer;
      document.getElementById('modalTitle').textContent = '编辑卡片';
      document.getElementById('editModal').classList.remove('hidden');
      document.getElementById('editModal').classList.add('flex');
    }

    function closeModal() {
      document.getElementById('editModal').classList.add('hidden');
      document.getElementById('editModal').classList.remove('flex');
    }

    async function saveCard() {
      const id = document.getElementById('editId').value;
      const question = document.getElementById('editQuestion').value.trim();
      const answer = document.getElementById('editAnswer').value.trim();

      if (!question || !answer) {
        alert('问题和回答都不能为空');
        return;
      }

      if (id) {
        // 编辑
        await fetch(`/api/faq/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question, answer })
        });
      } else {
        // 新增
        await fetch('/api/faq', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question, answer })
        });
      }

      closeModal();
      loadFaqList();
    }

    async function deleteCard(id) {
      if (!confirm('确定要删除这张卡片吗？')) return;
      await fetch(`/api/faq/${id}`, { method: 'DELETE' });
      loadFaqList();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
